services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: app_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d app_db"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  backend:
    image: asoatram/backend-python:v1.0.0
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@db:5432/app_db
      RUN_SEED: "true"
      SEED_MODE: reset
      SEED_SIZE: medium
      SEED_RANDOM_SEED: "42"
      PORT: "8000"
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"
    restart: unless-stopped

  frontend:
    image: asoatram/warehouse-fe:v1.0.0
    depends_on:
      backend:
        condition: service_started
    ports:
      - "8080:80"
    restart: unless-stopped

volumes:
  postgres_data:
